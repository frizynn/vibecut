services:
  redis:
    image: redis:7-alpine
    container_name: vibecut-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:18
    container_name: vibecut-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibecut
      POSTGRES_USER: vibecut
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibecut}
    ports:
      - "5432:5432"
    volumes:
      # Persist data across `docker compose down` so dev DBs survive restarts.
      - postgres_data_dev:/var/lib/postgresql/data
      # Auto-run migrations on first init only (postgres entrypoint convention).
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecut -d vibecut"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data_dev:
  redis_data_dev:
